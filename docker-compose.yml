version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./copilot.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - DEBUG=true
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
      - ./agents:/app/agents
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend

  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
    volumes:
      - ./data:/app/data
      - ./agents:/app/agents
